services:
  # Backend API — FastAPI
  - type: web
    name: cognitive-retrieval-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: HUGGING_FACE_HUB_TOKEN
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false

  # Frontend — Next.js
  - type: web
    name: cognitive-retrieval-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    dockerBuildArgs:
      NEXT_PUBLIC_API_URL: https://cognitive-retrieval-backend.onrender.com
    envVars:
      - key: NODE_ENV
        value: production

